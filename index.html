<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Edge">
<meta name="theme-color" content="#080808">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>Iron Edge</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--card:#111;--border:#1e1e1e;--text:#efefef;--muted:#5a5a5a;--subtle:#2a2a2a;--push:#e8622a;--pull:#27b872;--legs:#e8a82a;--arms:#9b2de8;--recovery:#3a88cc;--sb:env(safe-area-inset-bottom,16px);--st:env(safe-area-inset-top,0px);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
.shell{display:flex;flex-direction:column;height:100dvh;padding-top:var(--st);}
.bottom-nav{flex-shrink:0;display:flex;background:#0d0d0d;border-top:1px solid var(--border);padding-bottom:var(--sb);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 6px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:'Barlow',sans-serif;}
.nav-btn.active{color:var(--push);}
.nav-btn.ntrk.active{color:#4499dd;}
.nav-btn.ndsh.active{color:#e8b840;}
.nav-icon{font-size:20px;margin-bottom:3px;}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.active{display:flex;}
.hdr{flex-shrink:0;padding:14px 18px 10px;background:var(--bg);border-bottom:1px solid var(--border);}
.hdr-row{display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;color:#fff;line-height:1;}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px;}
.hdr-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;}
.bp{background:rgba(232,98,42,.15);color:var(--push);}
.bpu{background:rgba(39,184,114,.15);color:var(--pull);}
.bl{background:rgba(232,168,42,.15);color:var(--legs);}
.ba{background:rgba(155,45,232,.15);color:var(--arms);}
.br{background:rgba(58,136,204,.15);color:var(--recovery);}
.dscw{flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;border-bottom:1px solid var(--border);}
.dscw::-webkit-scrollbar{display:none;}
.dsc{display:flex;padding:10px 14px;gap:8px;width:max-content;}
.dc{display:flex;flex-direction:column;align-items:center;padding:8px 14px;border-radius:10px;background:var(--card);border:1.5px solid var(--border);cursor:pointer;min-width:64px;}
.dc.apush{border-color:var(--push);background:rgba(232,98,42,.08);}
.dc.apull{border-color:var(--pull);background:rgba(39,184,114,.08);}
.dc.alegs{border-color:var(--legs);background:rgba(232,168,42,.08);}
.dc.aarms{border-color:var(--arms);background:rgba(155,45,232,.08);}
.dc.arec{border-color:var(--recovery);background:rgba(58,136,204,.08);}
.dow{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.dname{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;text-transform:uppercase;white-space:nowrap;}
.dc.apush .dname,.cpush .dname{color:var(--push);}
.dc.apull .dname,.cpull .dname{color:var(--pull);}
.dc.alegs .dname,.clegs .dname{color:var(--legs);}
.dc.aarms .dname,.carms .dname{color:var(--arms);}
.dc.arec .dname,.crec .dname{color:var(--recovery);}
.cdone{font-size:10px;margin-top:2px;}
.btw{flex-shrink:0;overflow-x:auto;scrollbar-width:none;background:var(--card);border-bottom:1px solid var(--border);}
.btw::-webkit-scrollbar{display:none;}
.bts{display:flex;padding:0 14px;width:max-content;}
.bt{padding:11px 14px;font-size:12px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;}
.bt.apush{border-bottom-color:var(--push);color:var(--push);}
.bt.apull{border-bottom-color:var(--pull);color:var(--pull);}
.bt.alegs{border-bottom-color:var(--legs);color:var(--legs);}
.bt.aarms{border-bottom-color:var(--arms);color:var(--arms);}
.bt.arec{border-bottom-color:var(--recovery);color:var(--recovery);}
.bt.awu{border-bottom-color:#888;color:#aaa;}
.bt.acd{border-bottom-color:#3abcbc;color:#3abcbc;}
.ms{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.ssbar{background:#13091e;border-bottom:1px solid var(--border);padding:6px 14px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8844cc;display:flex;align-items:center;gap:6px;}
.ssdot{width:5px;height:5px;border-radius:50%;background:#8844cc;}
.exrow{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start;}
.exrow:last-child{border-bottom:none;}
.exmain{flex:1;min-width:0;}.exactions{display:flex;flex-direction:column;gap:6px;flex:0 0 auto;padding-top:2px;}
.exname{font-size:15px;font-weight:700;color:#fff;line-height:1.25;margin-bottom:5px;}
.expills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.psets{background:var(--subtle);color:#bbb;}
.preps{background:var(--subtle);color:#bbb;}
.prix{background:#1a1208;color:#aa8830;}
.psug{background:#0a1a0a;color:#55aa55;border:1px solid #1a3a1a;}
.exnote{font-size:11px;color:var(--muted);line-height:1.5;}
.extag{display:inline-block;margin-top:5px;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.tton{background:#0a1a2a;color:#4499dd;}
.tcus{background:#191908;color:#aaaa33;}
.tdb{background:#1a0808;color:#cc5544;}
.tcar{background:#080e1a;color:#4466cc;}
.nbox{background:#0f0e08;border-left:3px solid #333;border-radius:0 0 12px 12px;padding:11px 14px;font-size:11px;color:#777;line-height:1.6;}
.nbox strong{color:#999;}
.tstrip{display:flex;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.ti{flex:1;padding:11px 6px;border-right:1px solid var(--border);text-align:center;}
.ti:last-child{border-right:none;}
.ttime{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:#e8b840;line-height:1;margin-bottom:3px;}
.tlbl{font-size:11px;font-weight:600;color:#ccc;margin-bottom:2px;}
.tdet{font-size:9px;color:var(--muted);line-height:1.3;}
.wrow{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px;}
.wrow:last-child{border-bottom:none;}
.wname{font-size:13px;font-weight:500;color:#ddd;}
.wdet{font-size:11px;color:var(--muted);text-align:right;flex-shrink:0;max-width:130px;line-height:1.3;}
.slbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:14px 0 7px;display:flex;align-items:center;gap:8px;}
.slbl::after{content:'';flex:1;height:1px;background:var(--border);}
.pwcard{background:#0f0d08;border:1px solid #2a2010;border-radius:12px;padding:12px 14px;margin-bottom:10px;}
.pwtitle{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#c8a050;margin-bottom:8px;}
.pwrow{display:flex;align-items:baseline;gap:10px;padding:5px 0;border-bottom:1px solid #1a1508;}
.pwrow:last-child{border-bottom:none;}
.pwtb{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#e8b840;min-width:38px;}
.pwdesc{font-size:12px;color:#a08040;}
.reccard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.reccard h4{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;color:#aaa;margin-bottom:6px;}
.reccard p{font-size:12px;color:var(--muted);line-height:1.7;}
.donebtn{width:100%;padding:14px;border-radius:12px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-top:6px;}
.donebtn.pending{background:#161616;border:1.5px solid #333;color:#555;}
.donebtn.done{background:#0f2010;border:1.5px solid #2a6a2a;color:#44cc44;}
.cdcard{background:#080f10;border:1px solid #0e2a2a;border-radius:12px;overflow:hidden;margin-bottom:10px;}
.cdhd{background:#0a1a1a;padding:10px 14px;border-bottom:1px solid #0e2a2a;display:flex;align-items:center;gap:8px;}
.cdtitle{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#3abcbc;}
.cdsub{font-size:11px;color:#2a7a7a;margin-left:auto;}
.strow{padding:11px 14px;border-bottom:1px solid #0e1e1e;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.strow:last-child{border-bottom:none;}
.stleft{flex:1;}
.stname{font-size:13px;font-weight:600;color:#e0f0f0;margin-bottom:3px;}
.stcue{font-size:11px;color:#3a7a7a;line-height:1.5;}
.sthold{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:#3abcbc;flex-shrink:0;padding-top:1px;}
.cdnote{background:#060e0e;border-left:3px solid #0e3a3a;border-radius:0 0 12px 12px;padding:10px 14px;font-size:11px;color:#2a6a6a;line-height:1.6;}
.cdnote strong{color:#3a9a9a;}
.thdr{flex-shrink:0;padding:14px 18px 10px;border-bottom:1px solid var(--border);}
.ttitle{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;color:#fff;}
.tsub{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px;}
.tscr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 16px;}
.lfc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px;}
.lftitle{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#4499dd;margin-bottom:12px;}
.lfrow{display:flex;gap:8px;margin-bottom:8px;}
.lfsel,.lfin{background:#0d0d0d;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;padding:10px 12px;outline:none;-webkit-appearance:none;}
.lfsel{flex:2;}
.lfin{flex:1;text-align:center;}
.lfin:focus,.lfsel:focus{border-color:#4499dd;}
.lfbtn{width:100%;background:#4499dd;border:none;border-radius:8px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:12px;cursor:pointer;margin-top:4px;}
.lfbtn:active{background:#3388cc;}
.prbadge{display:inline-block;background:#1a2a08;color:#88cc44;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:6px;}
.ehcard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.ehhd{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.ehname{font-size:14px;font-weight:600;color:#fff;}
.ehbest{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:#88cc44;font-weight:700;}
.mchart{padding:12px 14px 4px;}
.cbars{display:flex;align-items:flex-end;gap:4px;height:52px;}
.cbw{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.cbar{width:100%;border-radius:3px 3px 0 0;min-height:4px;}
.cdate{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center;margin-top:3px;}
.cval{font-size:9px;color:#777;text-align:center;}
.hrow{padding:9px 14px;border-bottom:1px solid #181818;display:flex;justify-content:space-between;align-items:center;}
.hrow:last-child{border-bottom:none;}
.hdate{font-size:12px;color:var(--muted);}
.hw{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#ccc;}
.he1{font-size:11px;color:var(--muted);}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;line-height:1.6;}
.empty .ei{font-size:36px;margin-bottom:12px;}
.phcard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.phhero{padding:18px 16px 14px;background:linear-gradient(135deg,#1a1000 0%,#111 100%);border-bottom:1px solid var(--border);}
.phlabel{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#886600;margin-bottom:4px;}
.phname{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;text-transform:uppercase;line-height:1;margin-bottom:6px;}
.phdesc{font-size:12px;color:#887744;line-height:1.5;}
.phstats{display:flex;border-top:1px solid var(--border);}
.phstat{flex:1;padding:12px 14px;border-right:1px solid var(--border);text-align:center;}
.phstat:last-child{border-right:none;}
.phval{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;line-height:1;margin-bottom:2px;}
.phlbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.phbar{padding:12px 16px;border-top:1px solid var(--border);}
.phblabel{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:6px;}
.phtrack{height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden;}
.phfill{height:100%;border-radius:3px;}
.nxcard{background:#080d08;border:1px solid #0e2a0e;border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;}
.nxicon{font-size:22px;flex-shrink:0;margin-top:2px;}
.nxtext strong{font-size:13px;color:#66cc66;display:block;margin-bottom:3px;}
.nxtext span{font-size:11px;color:#336633;line-height:1.5;}
.skcard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.skhd{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;border-bottom:1px solid var(--border);}
.sktitle{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;color:#aaa;}
.sknum{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;color:var(--push);line-height:1;}
.skunit{font-size:11px;color:var(--muted);}
.skwks{display:flex;gap:5px;padding:10px 14px 12px;flex-wrap:wrap;}
.sdot{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.sdfull{background:#1a2a0a;color:#66cc33;border:1px solid #2a4a1a;}
.sdpart{background:#1a1a08;color:#886622;border:1px solid #333;}
.sdempty{background:#111;color:#333;border:1px solid #1a1a1a;}
.slcard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.slhd{padding:12px 14px;border-bottom:1px solid var(--border);}
.sltitle{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;color:#aaa;}
.slrow{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid #181818;gap:10px;}
.slrow:last-child{border-bottom:none;}
.slname{font-size:13px;font-weight:600;color:#ccc;flex:1;}
.sldate{font-size:11px;color:var(--muted);}
.slck{font-size:15px;width:22px;text-align:center;}
.prwall{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.prwhd{padding:12px 14px;border-bottom:1px solid var(--border);}
.prwtitle{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;color:#aaa;}
.prrow{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #181818;gap:10px;}
.prrow:last-child{border-bottom:none;}
.prex{font-size:13px;font-weight:600;color:#ddd;flex:1;line-height:1.3;}
.prright{text-align:right;flex-shrink:0;}
.prval{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:#e8b840;}
.prsub{font-size:10px;color:var(--muted);}
.toast{position:fixed;bottom:calc(76px + var(--sb));left:50%;transform:translateX(-50%);background:#1a2a10;border:1px solid #44aa22;color:#88dd44;font-size:13px;font-weight:600;padding:10px 20px;border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:200;}
.toast.show{opacity:1;}
.synccard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.synchd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);}
.synctitle{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;color:#aaa;}
.syncstat{font-size:12px;font-weight:600;}
.syncbody{padding:12px 14px;}
.synclast{font-size:11px;color:var(--muted);margin-bottom:10px;}
.syncbtns{display:flex;gap:8px;margin-bottom:6px;}
.sbtn{flex:1;padding:10px 6px;border-radius:8px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;text-align:center;-webkit-appearance:none;}
.sbtn:active{opacity:.7;}
.sb-save{background:#0a1a0a;color:#44cc44;border:1px solid #1a4a1a;}
.sb-load{background:#0a0d1a;color:#4488dd;border:1px solid #1a2a4a;}
.sb-export{background:#1a1208;color:#aa8830;border:1px solid #3a2810;}
.sb-import{background:#1a0a1a;color:#aa44cc;border:1px solid #3a1a4a;display:flex;align-items:center;justify-content:center;}
.synctok{margin-top:10px;}
.synctok-in{background:#0d0d0d;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:9px 12px;outline:none;width:100%;font-family:'Barlow',sans-serif;margin-bottom:6px;-webkit-appearance:none;}
.synctok-in:focus{border-color:#4499dd;}
.synctok-btn{width:100%;background:#4499dd;border:none;border-radius:8px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;padding:10px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;}
.synctok-hint{font-size:11px;color:var(--muted);margin-top:8px;cursor:pointer;line-height:1.5;}
@keyframes fu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.ms>*,.tscr>*{animation:fu .18s ease both;}
.cdtimer{padding:12px 14px 10px;border-bottom:1px solid #0e2a2a;}
.cdtimer-start{width:100%;background:#0a2a2a;border:1.5px solid #1a5a5a;color:#3abcbc;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:12px;border-radius:8px;cursor:pointer;}
.cdtimer-start:active{background:#0d3a3a;}
.cdtimer-live{display:flex;flex-direction:column;align-items:center;gap:6px;}
.cdtimer-phase{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#2a8a8a;}
.cdtimer-exname{font-size:15px;font-weight:700;color:#e0f0f0;text-align:center;line-height:1.3;max-width:280px;}
.cdtimer-count{font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:900;color:#3abcbc;line-height:1;}
.cdtimer-track{width:100%;height:5px;background:#0e2a2a;border-radius:3px;overflow:hidden;}
.cdtimer-fill{height:100%;border-radius:3px;background:#3abcbc;transition:width .9s linear;}

// ── STORAGE ──────────────────────────────────────────────────────────────────

var SK='travis_progress_v1',SKB='travis_progress_v1_bak',SK2='travis_sessions_v1',SK_SEED='travis_seeded';
function ll(){
  try{var d=localStorage.getItem(SK);if(d){var r=JSON.parse(d);if(r&&Object.keys(r).length)return r;}}catch(e){}
  try{var b=localStorage.getItem(SKB);if(b){var rb=JSON.parse(b);if(rb&&Object.keys(rb).length){sl(rb);return rb;}}}catch(e2){}
  return{};
}
function sl(l){var s=JSON.stringify(l);localStorage.setItem(SK,s);localStorage.setItem(SKB,s);}
function ls(){try{return JSON.parse(localStorage.getItem(SK2))||{};}catch(e){return{};}}
function ss(s){localStorage.setItem(SK2,JSON.stringify(s));}
function isSeeded(){return localStorage.getItem(SK_SEED)==='1';}
function setSeeded(){localStorage.setItem(SK_SEED,'1');}
function migrateSeed(){
  try{
    var raw=localStorage.getItem(SK);if(!raw)return;
    var o=JSON.parse(raw);
    if(o&&o._seeded!==undefined){if(o._seeded)setSeeded();delete o._seeded;sl(o);}
  }catch(e){}
}
function e1rm(w,r){return Math.round(w*(1+r/30));}
function today(){return new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});}

function logSet(ex,w,r){
  var logs=ll();if(!logs[ex])logs[ex]=[];
  var entry={date:today(),ts:Date.now(),weight:w,reps:r,e1rm:e1rm(w,r)};
  var sd=null;for(var i=0;i<logs[ex].length;i++){if(logs[ex][i].date===today()){sd=logs[ex][i];break;}}
  if(sd){if(w>sd.weight||(w===sd.weight&&r>sd.reps)){logs[ex]=logs[ex].filter(function(e){return e.date!==today();});logs[ex].push(entry);}}
  else{logs[ex].push(entry);}
  logs[ex].sort(function(a,b){return a.ts-b.ts;});sl(logs);
}
function isPR(ex,w,r){var logs=ll();if(!logs[ex]||!logs[ex].length)return true;var best=Math.max.apply(null,logs[ex].map(function(e){return e.e1rm;}));return e1rm(w,r)>best;}
function seedBaseline(){
  if(isSeeded())return;
  var logs=ll();
  var d='May 9';
  if(!logs['Incline Barbell Bench Press']||!logs['Incline Barbell Bench Press'].length)
    logs['Incline Barbell Bench Press']=[{date:d,ts:new Date('2025-05-09').getTime(),weight:160,reps:6,e1rm:192}];
  if(!logs['Barbell Bench Press (Flat)']||!logs['Barbell Bench Press (Flat)'].length)
    logs['Barbell Bench Press (Flat)']=[{date:d,ts:new Date('2025-05-09').getTime()+500,weight:192,reps:8,e1rm:243}];
  sl(logs);setSeeded();
}

// ── PHASE ───────────────────────────────────────────────────────────────────

function getPhase(){
  var msW=7*24*60*60*1000;
  var totalW=Math.max(0,Math.floor((Date.now()-PROGRAM_START)/msW));
  var cw=totalW%18;
  if(cw<8)return{phase:PHASES[0],wip:cw+1,tot:8,totalW:totalW+1};
  if(cw<16)return{phase:PHASES[1],wip:cw-7,tot:8,totalW:totalW+1};
  return{phase:PHASES[2],wip:cw-15,tot:2,totalW:totalW+1};
}
function lowReps(rs){var m=(''+rs).match(/\d+/);return m?parseInt(m[0],10):null;}

function phaseReps(base){
  var ph=getPhase().phase.name;
  if(ph!=='Intensification')return base;
  var lo=lowReps(base);if(lo===null)return base;
  var hi=highReps(base);
  var nlo=Math.max(3,Math.round(lo*0.65)),nhi=Math.max(nlo+1,Math.round(hi*0.65));
  return nlo+'-'+nhi;
}
function getSugg(ex,repRange){
  var logs=ll();if(!logs[ex]||!logs[ex].length)return null;
  var ph=getPhase();
  var best=logs[ex].reduce(function(b,e){return e.e1rm>b.e1rm?e:b;},logs[ex][0]);
  var tr=(repRange&&lowReps(repRange))||ph.phase.treps;
  var suggested=Math.round((best.e1rm/(1+tr/30))*ph.phase.wmult/2.5)*2.5;
  return{weight:suggested,reps:tr};
}

function buildCDTimerHTML(){
  if(!cdTimerState)return'<button class="cdtimer-start" onclick="startCDTimer(\''+currentCDT+'\')">▶ Start Cooldown Timer</button>';
  if(cdTimerState.done)return'<div class="cdtimer-done">✅ Cooldown complete — great work!</div>';
  var st=cdTimerState,s=st.stretches[st.idx];
  var pct=Math.round(((st.total-st.remaining)/st.total)*100);
  var side=s.bilateral?(st.side===0?' — Left':' — Right'):'';
  return'<div class="cdtimer-live">'+
    '<div class="cdtimer-phase">Stretch '+(st.idx+1)+' / '+st.stretches.length+side+'</div>'+

    '<div class="cdtimer-count">'+st.remaining+'</div>'+
    '<div class="cdtimer-track"><div class="cdtimer-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="cdtimer-btns">'+
    '<button class="cdtimer-btn cdtimer-skip" onclick="skipCDStep()">Skip →</button>'+
    '<button class="cdtimer-btn cdtimer-stop" onclick="stopCDTimer()">■ Stop</button>'+
    '</div></div>';
}
function startCDTimer(cdt){
  if(cdTimerState)clearInterval(cdTimerState.intervalId);
  try{cdAudioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){cdAudioCtx=null;}
  var strs=CD[cdt].s.map(function(s){var p=parseCDHold(s.h);return{name:s.n,secs:p.secs,bilateral:p.bilateral};});
  cdTimerState={cdt:cdt,stretches:strs,idx:0,side:0,total:strs[0].secs,remaining:strs[0].secs,done:false,intervalId:null};
  var f=strs[0];cdSpeak(f.bilateral?f.name+'. Left side.':f.name);
  cdTimerState.intervalId=setInterval(tickCDTimer,1000);
  updateCDTimerUI();
}
var cdAudioCtx=null;
function cdChime(pitch){
  try{
    if(!cdAudioCtx||cdAudioCtx.state==='closed')return;
    if(cdAudioCtx.state==='suspended')cdAudioCtx.resume();
    var osc=cdAudioCtx.createOscillator(),gain=cdAudioCtx.createGain();
    osc.connect(gain);gain.connect(cdAudioCtx.destination);
    osc.type='sine';osc.frequency.value=pitch||880;
    var t=cdAudioCtx.currentTime;
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(0.18,t+0.015);
    gain.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    osc.start(t);osc.stop(t+0.35);
  }catch(e){}
}
function tickCDTimer(){
  if(!cdTimerState||cdTimerState.done)return;
  cdTimerState.remaining--;
  var r=cdTimerState.remaining;
  if(r<=0){advanceCDStep();return;}
  if(r===3)cdChime(660);
  else if(r===2)cdChime(770);
  else if(r===1)cdChime(880);
  updateCDTimerUI();
}
function advanceCDStep(){
  var st=cdTimerState,curr=st.stretches[st.idx];
  if(curr.bilateral&&st.side===0){
    st.side=1;st.total=curr.secs;st.remaining=curr.secs;
    cdSpeak('Switch. Right side.');updateCDTimerUI();return;
  }
  st.idx++;st.side=0;
  if(st.idx>=st.stretches.length){
    st.done=true;clearInterval(st.intervalId);
    cdSpeak('Cooldown complete. Great work.');updateCDTimerUI();return;
  }
  var nxt=st.stretches[st.idx];
  st.total=nxt.secs;st.remaining=nxt.secs;
  cdSpeak(nxt.bilateral?nxt.name+'. Left side.':nxt.name);
  updateCDTimerUI();
}
function skipCDStep(){if(cdTimerState)advanceCDStep();}
function stopCDTimer(){
  if(cdTimerState){clearInterval(cdTimerState.intervalId);cdTimerState=null;}
  updateCDTimerUI();
}
function updateCDTimerUI(){
  var wrap=document.getElementById('cdTimerWrap');
  if(!wrap)return;
  wrap.innerHTML=buildCDTimerHTML();
  document.querySelectorAll('.strow[data-si]').forEach(function(el){
    var si=parseInt(el.getAttribute('data-si'));
    el.classList.toggle('cdactive',!!cdTimerState&&!cdTimerState.done&&si===cdTimerState.idx);
  });
  updateCDDemo();
}

function buildRecentPRs(){
  var logs=ll(),prs=[];
  TRACK_EX.forEach(function(ex){
    if(!logs[ex]||!logs[ex].length)return;
    var sorted=[].concat(logs[ex]).sort(function(a,b){return a.ts-b.ts;});
    var maxE=0;
    sorted.forEach(function(e){if(e.e1rm>maxE){maxE=e.e1rm;prs.push({ex:ex,e:e});}});
  });
  prs.sort(function(a,b){return b.e.ts-a.e.ts;});
  return prs.slice(0,12);
}
function buildTracker(){
  var logs=ll();
  var opts=TRACK_EX.map(function(e){return'<option value="'+e+'">'+e+'</option>';}).join('');
  var withData=TRACK_EX.filter(function(e){return logs[e]&&logs[e].length>0;});
  var histH=withData.length===0?'<div class="empty"><div class="ei">📊</div>No entries yet.<br>Log your first set above!</div>':
    withData.map(function(ex){
      var entries=logs[ex];
      var best=entries.reduce(function(b,e){return e.e1rm>b.e1rm?e:b;},entries[0]);
      var recent=entries.slice(-8);
      var maxW=Math.max.apply(null,recent.map(function(e){return e.weight;}));
      var bars=recent.map(function(e){
        var h=Math.max(6,Math.round((e.weight/maxW)*44));

      }).join('');
      var rows=[].concat(entries).reverse().slice(0,6).map(function(e){

        return'<div class="hrow"><div class="hdate">'+e.date+'</div><div style="text-align:right"><span class="hw">'+e.weight+' x '+e.reps+'</span>'+pr+'<div class="he1">e1RM ~'+e.e1rm+' lb</div></div></div>';
      }).join('');

    }).join('')+'</div>':'';
  document.getElementById('trackerScroll').innerHTML='<div class="lfc"><div class="lftitle">📝 Log Top Set</div><div class="lfrow"><select class="lfsel" id="logEx">'+opts+'</select></div><div class="lfrow"><input class="lfin" id="logW" type="number" placeholder="lbs" inputmode="decimal" min="0" step="2.5"><input class="lfin" id="logR" type="number" placeholder="reps" inputmode="numeric" min="1" max="30"></div><button class="lfbtn" onclick="handleLog()">Save Set</button></div>'+btH+histH;
}

function xpTotal(){return xpGetLog().reduce(function(t,e){return t+e.amt;},0);}
function xpLevel(){
  var total=xpTotal();
  var cur=IE_LEVELS[0],next=null;
  for(var i=0;i<IE_LEVELS.length;i++){if(total>=IE_LEVELS[i].xp)cur=IE_LEVELS[i];}
  for(var j=0;j<IE_LEVELS.length;j++){if(IE_LEVELS[j].xp>total){next=IE_LEVELS[j];break;}}
  var pct=next?Math.round(((total-cur.xp)/(next.xp-cur.xp))*100):100;
  return{level:cur.level,name:cur.name,xp:total,curXp:cur.xp,nextXp:next?next.xp:null,nextName:next?next.name:null,pct:Math.min(100,Math.max(0,pct))};

function e1rmSparkline(sessions){
  var data=[].concat(sessions).reverse();
  if(data.length<2)return'';
  var W=300,H=72,padX=28,padY=14;
  var vals=data.map(function(s){return s.e1rm;});
  var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
  var range=maxV-minV||1;
  var pts=data.map(function(s,i){
    return{x:padX+i*(W-2*padX)/(data.length-1),
           y:H-padY-(s.e1rm-minV)/range*(H-2*padY),s:s};
  });
  var poly=pts.map(function(p){return p.x+','+p.y;}).join(' ');
  var dots=pts.map(function(p){
    var best=p.s.e1rm>=maxV;
    return'<circle cx="'+p.x+'" cy="'+p.y+'" r="'+(best?4:2.5)+'" fill="'+(best?'#d62828':'#444')+'"/>'+(best?'<text x="'+p.x+'" y="'+(p.y-7)+'" fill="#d62828" font-size="9" text-anchor="middle">'+p.s.e1rm+'</text>':'');
  }).join('');
  var fl=pts[0],la=pts[pts.length-1];
  var labels='<text x="'+fl.x+'" y="'+(H+2)+'" fill="#444" font-size="8" text-anchor="middle">'+fl.s.date+'</text>'+
    '<text x="'+la.x+'" y="'+(H+2)+'" fill="#444" font-size="8" text-anchor="middle">'+la.s.date+'</text>';
  return'<div class="hd-chart"><svg width="100%" viewBox="0 0 '+W+' '+(H+10)+'" style="overflow:visible">'+
    '<polyline points="'+poly+'" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>'+
    dots+labels+'</svg></div>';
}
function histSessions(ex){
  var logs=ll();if(!logs[ex]||!logs[ex].length)return[];
  var byDate={};
  logs[ex].forEach(function(e){
    if(!byDate[e.date]||e.e1rm>byDate[e.date].e1rm)byDate[e.date]=e;
  });
  return Object.values(byDate).sort(function(a,b){return b.ts-a.ts;}).slice(0,5);
}
histSessions._all=function(ex){
  var logs=ll();if(!logs[ex]||!logs[ex].length)return[];
  var byDate={};
  logs[ex].forEach(function(e){
    if(!byDate[e.date]||e.e1rm>byDate[e.date].e1rm)byDate[e.date]=e;
  });
  return Object.values(byDate).sort(function(a,b){return a.ts-b.ts;});
};
function avaHistoryLine(ex,sessions,sug){
  if(!sessions.length)return'No sessions logged yet — this is your baseline to beat.';
  if(sessions.length===1)return'First session logged. Build the baseline — the trend starts now.';
  var latest=sessions[0],prev=sessions[1];
  var allE=sessions.map(function(s){return s.e1rm;});
  var bestE=Math.max.apply(null,allE),bestIdx=allE.indexOf(bestE);
  var trend=latest.e1rm-prev.e1rm;
  var rising=sessions.length>=3&&sessions[0].e1rm>sessions[1].e1rm&&sessions[1].e1rm>=sessions[2].e1rm;
  var stalled=sessions.length>=3&&sessions[0].weight===sessions[1].weight&&sessions[1].weight===sessions[2].weight;
  if(bestIdx===0)return'That\'s a PR session — '+latest.weight+' × '+latest.reps+' is your new ceiling. Now make it the floor.';
  if(rising)return'Trending up three straight. Last time: '+prev.weight+' × '+prev.reps+'. Today, see if '+(prev.weight+2.5)+' × '+prev.reps+' or '+prev.weight+' × '+(prev.reps+1)+' is there.';
  if(stalled)return'Same weight '+sessions.filter(function(s){return s.weight===latest.weight;}).length+' sessions running. Time to add 5 lbs and see what happens.';
  if(trend>0)return'Up from last time — '+prev.weight+' × '+prev.reps+' to '+latest.weight+' × '+latest.reps+'. Keep that momentum.';
  if(trend<0)return'Step back from your best. Lock in the form, then push the weight back up.';
  return'Consistent at '+latest.weight+'. When '+sessions.filter(function(s){return s.weight>=latest.weight;}).length+' sets feel easy, add 5 lbs.';
}

function getWeeklyVolume(n){
  var logs=ll(),msW=7*24*60*60*1000;
  var curW=Math.max(0,Math.floor((Date.now()-PROGRAM_START)/msW));
  var startW=Math.max(0,curW-n+1),data=[];
  for(var w=startW;w<=curW;w++){
    var ws=PROGRAM_START+w*msW,we=ws+msW,vol=0;
    TRACK_EX.forEach(function(ex){if(logs[ex])logs[ex].forEach(function(e){if(e.ts>=ws&&e.ts<we)vol+=Math.round(e.weight*e.reps);});});
    data.push({w:w,vol:vol,label:'W'+(w+1),cur:w===curW});
  }
  return data;
}
function weekVolumeCard(){
  var data=getWeeklyVolume(8);
  if(!data.some(function(d){return d.vol>0;}))return'';
  var maxV=Math.max.apply(null,data.map(function(d){return d.vol;}));
  var bw=28,gap=7,H=80;
  var bars=data.map(function(d,i){
    var bh=maxV?Math.max(4,Math.round(d.vol/maxV*(H-22))):4;
    var x=i*(bw+gap),y=H-bh-14;
    var fill=d.cur?'#d62828':(d.vol?'#1e1e1e':'transparent');
    var stroke=d.cur?'none':'#2a2a2a';
    var vl=d.vol>0?'<text x="'+(x+bw/2)+'" y="'+(y-3)+'" fill="'+(d.cur?'#d62828':'#555')+'" font-size="7.5" text-anchor="middle">'+(d.vol>=1000?Math.round(d.vol/1000)+'k':d.vol)+'</text>':'';
    return'<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bh+'" rx="3" fill="'+fill+'" stroke="'+stroke+'" stroke-width="1"/>'+vl+
      '<text x="'+(x+bw/2)+'" y="'+(H-1)+'" fill="'+(d.cur?'#888':'#3a3a3a')+'" font-size="7.5" text-anchor="middle">'+d.label+'</text>';
  }).join('');
  var tw=(bw+gap)*data.length-gap;
  var cur=data[data.length-1];
  return'<div class="wvc"><div class="wvc-head"><span class="wvc-title">📈 Weekly Volume</span>'+
    '<span class="wvc-cur">'+(cur.vol?Number(cur.vol).toLocaleString()+' lb this week':'building...')+'</span></div>'+
    '<svg width="100%" viewBox="0 0 '+tw+' '+H+'" preserveAspectRatio="none" style="overflow:visible">'+bars+'</svg></div>';

var GH_REPO='travbenn2026/travis-workout-pwa';
var GH_FILE='workout-data.json';
var SK_TOK='travis_gh_token';
var SK_SYNC='travis_sync_meta';

function getToken(){return localStorage.getItem(SK_TOK)||'';}
function setToken(t){if(t)localStorage.setItem(SK_TOK,t.trim());}
function maskToken(){var t=getToken();return t?'••••••'+t.slice(-6):'';}
function getSyncMeta(){try{return JSON.parse(localStorage.getItem(SK_SYNC))||{};}catch(e){return{};}}
function setSyncMeta(m){localStorage.setItem(SK_SYNC,JSON.stringify(m));}

function ghLoad(){
  var url='https://raw.githubusercontent.com/'+GH_REPO+'/main/'+GH_FILE+'?t='+Date.now();
  var ctrl=new AbortController();
  var to=setTimeout(function(){ctrl.abort();},8000);
  return fetch(url,{signal:ctrl.signal,cache:'no-store'}).then(function(r){
    clearTimeout(to);return r.ok?r.json():null;
  }).catch(function(){clearTimeout(to);return null;});
}

function ghSave(token){
  var data={logs:ll(),sessions:ls(),lastSaved:new Date().toISOString(),version:1,seeded:isSeeded()};
  var encoded=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  return fetch('https://api.github.com/repos/'+GH_REPO+'/contents/'+GH_FILE,{
    headers:{'Authorization':'Bearer '+token}
  }).then(function(r){return r.ok?r.json():null;})
  .then(function(meta){
    var payload={message:'Sync workout data '+new Date().toLocaleDateString(),content:encoded};
    if(meta&&meta.sha)payload.sha=meta.sha;
    return fetch('https://api.github.com/repos/'+GH_REPO+'/contents/'+GH_FILE,{
      method:'PUT',
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
  }).then(function(r){
    if(r.ok){setSyncMeta({lastSaved:data.lastSaved});setToken(token);return true;}
    return false;
  }).catch(function(){return false;});
}

function mergeAndApply(ghData){
  if(!ghData)return false;
  var localLogs=ll(),ghLogs=ghData.logs||{},merged=JSON.parse(JSON.stringify(localLogs));
  if(ghData.seeded||ghLogs._seeded)setSeeded();
  Object.keys(ghLogs).forEach(function(ex){
    var gv=ghLogs[ex];
    if(!Array.isArray(gv))return;
    if(!Array.isArray(merged[ex])){merged[ex]=gv.slice();return;}
    var existing=new Set(merged[ex].map(function(e){return e.ts;}));
    gv.forEach(function(entry){if(!existing.has(entry.ts))merged[ex].push(entry);});
    merged[ex].sort(function(a,b){return a.ts-b.ts;});
  });
  Object.keys(merged).forEach(function(k){if(!Array.isArray(merged[k]))delete merged[k];});
  sl(merged);
  var mergedSess=Object.assign({},ghData.sessions||{},ls());
  ss(mergedSess);
  setSyncMeta(Object.assign(getSyncMeta(),{lastSaved:ghData.lastSaved,lastLoaded:new Date().toISOString()}));
  return true;
}

function exportJSON(){
  var data={logs:ll(),sessions:ls(),exported:new Date().toISOString()};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;
  a.download='workout-backup-'+new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'2-digit'}).replace(/\//g,'-')+'.json';
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}

function importJSON(file){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(data.logs)sl(data.logs);
      if(data.sessions)ss(data.sessions);
      setSyncMeta({lastSaved:data.exported||data.lastSaved||null});
      showToast('✅ Backup imported');
      if(document.getElementById('sD').classList.contains('active'))buildDash();
      if(document.getElementById('sT').classList.contains('active'))buildTracker();
    }catch(err){showToast('❌ Invalid backup file');}
  };
  reader.readAsText(file);
}

function autoLoadFromGH(){
  ghLoad().then(function(data){
    if(data){
      var meta=getSyncMeta();
      var ghTime=data.lastSaved?new Date(data.lastSaved).getTime():0;
      var localTime=meta.lastSaved?new Date(meta.lastSaved).getTime():0;
      if(ghTime>localTime){mergeAndApply(data);showToast('☁️ Data synced from cloud');}
    }
  }).catch(function(){}).then(function(){avaEventCheck();});
}

function syncSave(){
  var token=getToken();
  if(!token){showSyncTok();return;}
  updSyncStat('⏳ Saving...');
  ghSave(token).then(function(ok){
    if(ok){showToast('☁️ Saved to GitHub');updSyncStat('✅ Saved');}
    else{showToast('❌ Save failed — token may be expired');showSyncTok();updSyncStat('❌ Error');}
    if(document.getElementById('sD').classList.contains('active'))buildDash();
  });
}

function syncLoad(){
  updSyncStat('⏳ Loading...');
  ghLoad().then(function(data){
    if(data){
      try{mergeAndApply(data);showToast('☁️ Loaded from GitHub');updSyncStat('✅ Loaded');}
      catch(err){showToast('❌ Load error — data not applied');updSyncStat('❌ Error');}
    }else{showToast('❌ Load failed — check connection');updSyncStat('❌ Error');}
    if(document.getElementById('sD').classList.contains('active'))buildDash();
    if(document.getElementById('sT').classList.contains('active'))buildTracker();
  }).catch(function(){updSyncStat('❌ Error');showToast('❌ Load failed');});
}

function syncSaveWithToken(){
  var input=document.getElementById('syncTokInput');
  var token=input?input.value.trim():'';
  if(!token){showToast('Enter a token first');return;}
  setToken(token);hideSyncTok();syncSave();

function showSyncTok(){var s=document.getElementById('syncTokSec');if(s)s.style.display='block';}
