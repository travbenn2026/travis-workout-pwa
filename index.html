<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<meta name="theme-color" content="#080808">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
<link rel="apple-touch-icon" sizes="76x76" href="icons/icon-76.png">
<title>Travis's Program</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808; --card: #111; --border: #1e1e1e; --text: #efefef;
    --muted: #5a5a5a; --subtle: #2a2a2a;
    --push: #e8622a; --pull: #27b872; --legs: #e8a82a; --arms: #9b2de8; --recovery: #3a88cc;
    --safe-bottom: env(safe-area-inset-bottom, 16px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  .shell { display: flex; flex-direction: column; height: 100dvh; padding-top: var(--safe-top); }

  /* BOTTOM NAV */
  .bottom-nav { flex-shrink: 0; display: flex; background: #0d0d0d; border-top: 1px solid var(--border); padding-bottom: var(--safe-bottom); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0 6px; cursor: pointer; border: none; background: none; color: var(--muted); font-family: 'Barlow', sans-serif; transition: color 0.15s; }
  .nav-btn.active { color: var(--push); }
  .nav-btn.active.nav-track { color: #4499dd; }
  .nav-icon  { font-size: 20px; margin-bottom: 3px; }
  .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

  /* SCREENS */
  .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .screen.active { display: flex; }

  /* HEADER */
  .header { flex-shrink: 0; padding: 14px 18px 10px; background: var(--bg); border-bottom: 1px solid var(--border); }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .prog-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; color: #fff; line-height: 1; }
  .prog-sub   { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }
  .header-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase; }
  .badge-push     { background: rgba(232,98,42,0.15);  color: var(--push); }
  .badge-pull     { background: rgba(39,184,114,0.15); color: var(--pull); }
  .badge-legs     { background: rgba(232,168,42,0.15); color: var(--legs); }
  .badge-arms     { background: rgba(155,45,232,0.15); color: var(--arms); }
  .badge-recovery { background: rgba(58,136,204,0.15); color: var(--recovery); }

  /* DAY CHIPS */
  .day-scroll-wrap { flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; border-bottom: 1px solid var(--border); }
  .day-scroll-wrap::-webkit-scrollbar { display: none; }
  .day-scroll { display: flex; padding: 10px 14px; gap: 8px; width: max-content; }
  .day-chip { display: flex; flex-direction: column; align-items: center; padding: 8px 14px; border-radius: 10px; background: var(--card); border: 1.5px solid var(--border); cursor: pointer; min-width: 64px; }
  .day-chip.active-push     { border-color: var(--push);     background: rgba(232,98,42,0.08); }
  .day-chip.active-pull     { border-color: var(--pull);     background: rgba(39,184,114,0.08); }
  .day-chip.active-legs     { border-color: var(--legs);     background: rgba(232,168,42,0.08); }
  .day-chip.active-arms     { border-color: var(--arms);     background: rgba(155,45,232,0.08); }
  .day-chip.active-recovery { border-color: var(--recovery); background: rgba(58,136,204,0.08); }
  .chip-dow  { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .chip-name { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 800; text-transform: uppercase; white-space: nowrap; }
  .chip-push .chip-name,     .active-push .chip-name     { color: var(--push); }
  .chip-pull .chip-name,     .active-pull .chip-name     { color: var(--pull); }
  .chip-legs .chip-name,     .active-legs .chip-name     { color: var(--legs); }
  .chip-arms .chip-name,     .active-arms .chip-name     { color: var(--arms); }
  .chip-recovery .chip-name, .active-recovery .chip-name { color: var(--recovery); }

  /* BLOCK TABS */
  .block-tabs-wrap { flex-shrink: 0; overflow-x: auto; scrollbar-width: none; background: var(--card); border-bottom: 1px solid var(--border); }
  .block-tabs-wrap::-webkit-scrollbar { display: none; }
  .block-tabs { display: flex; padding: 0 14px; width: max-content; }
  .block-tab { padding: 11px 14px; font-size: 12px; font-weight: 600; color: var(--muted); border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; }
  .block-tab.active-push     { border-bottom-color: var(--push);     color: var(--push); }
  .block-tab.active-pull     { border-bottom-color: var(--pull);     color: var(--pull); }
  .block-tab.active-legs     { border-bottom-color: var(--legs);     color: var(--legs); }
  .block-tab.active-arms     { border-bottom-color: var(--arms);     color: var(--arms); }
  .block-tab.active-recovery { border-bottom-color: var(--recovery); color: var(--recovery); }
  .block-tab.active-warmup   { border-bottom-color: #888;            color: #aaa; }
  .block-tab.active-cooldown { border-bottom-color: #3abcbc;         color: #3abcbc; }

  /* MAIN SCROLL */
  .main-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 14px 16px; }

  /* EXERCISE CARDS */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
  .ss-bar { background: #13091e; border-bottom: 1px solid var(--border); padding: 6px 14px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #8844cc; display: flex; align-items: center; gap: 6px; }
  .ss-dot { width: 5px; height: 5px; border-radius: 50%; background: #8844cc; }
  .ex-row { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .ex-row:last-child { border-bottom: none; }
  .ex-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
  .ex-name { font-size: 14px; font-weight: 600; color: #fff; flex: 1; line-height: 1.2; }
  .ex-pills { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
  .pill { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
  .pill-sets { background: var(--subtle); color: #bbb; }
  .pill-reps { background: var(--subtle); color: #bbb; }
  .pill-rir  { background: #1a1208; color: #aa8830; }
  .ex-note { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .ex-tag { display: inline-block; margin-top: 5px; padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
  .tag-tonal  { background: #0a1a2a; color: #4499dd; }
  .tag-custom { background: #191908; color: #aaaa33; }
  .tag-db     { background: #1a0808; color: #cc5544; }
  .tag-cardio { background: #080e1a; color: #4466cc; }
  .note-box { background: #0f0e08; border-left: 3px solid #333; border-radius: 0 0 12px 12px; padding: 11px 14px; font-size: 11px; color: #777; line-height: 1.6; }
  .note-box strong { color: #999; }

  /* WARMUP ELEMENTS */
  .timing-strip { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
  .t-item { flex: 1; padding: 11px 6px; border-right: 1px solid var(--border); text-align: center; }
  .t-item:last-child { border-right: none; }
  .t-time   { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 800; color: #e8b840; line-height: 1; margin-bottom: 3px; }
  .t-label  { font-size: 11px; font-weight: 600; color: #ccc; margin-bottom: 2px; }
  .t-detail { font-size: 9px; color: var(--muted); line-height: 1.3; }
  .warmup-row { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .warmup-row:last-child { border-bottom: none; }
  .warmup-name   { font-size: 13px; font-weight: 500; color: #ddd; }
  .warmup-detail { font-size: 11px; color: var(--muted); text-align: right; flex-shrink: 0; max-width: 130px; line-height: 1.3; }
  .section-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin: 14px 0 7px; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .pw-card { background: #0f0d08; border: 1px solid #2a2010; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
  .pw-title { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #c8a050; margin-bottom: 8px; }
  .pw-row { display: flex; align-items: baseline; gap: 10px; padding: 5px 0; border-bottom: 1px solid #1a1508; }
  .pw-row:last-child { border-bottom: none; }
  .pw-time-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; color: #e8b840; min-width: 38px; }
  .pw-desc { font-size: 12px; color: #a08040; }
  .rec-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .rec-card h4 { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 800; text-transform: uppercase; color: #aaa; margin-bottom: 6px; }
  .rec-card p  { font-size: 12px; color: var(--muted); line-height: 1.7; }

  /* TRACKER SCREEN */
  .tracker-header { flex-shrink: 0; padding: 14px 18px 10px; border-bottom: 1px solid var(--border); }
  .tracker-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; text-transform: uppercase; color: #fff; }
  .tracker-sub   { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }
  .tracker-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 14px 16px; }

  /* LOG FORM */
  .log-form-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
  .log-form-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: #4499dd; margin-bottom: 12px; }
  .log-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .log-select, .log-input { background: #0d0d0d; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; padding: 10px 12px; outline: none; -webkit-appearance: none; }
  .log-select { flex: 2; }
  .log-input  { flex: 1; text-align: center; }
  .log-input:focus, .log-select:focus { border-color: #4499dd; }
  .log-btn { width: 100%; background: #4499dd; border: none; border-radius: 8px; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; padding: 12px; cursor: pointer; margin-top: 4px; }
  .log-btn:active { background: #3388cc; }

  /* HISTORY CARDS */
  .pr-badge { display: inline-block; background: #1a2a08; color: #88cc44; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; letter-spacing: 0.5px; margin-left: 6px; }
  .ex-hist-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
  .ex-hist-head { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .ex-hist-name { font-size: 14px; font-weight: 600; color: #fff; }
  .ex-hist-best { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: #88cc44; font-weight: 700; }
  .mini-chart  { padding: 12px 14px 4px; }
  .chart-bars  { display: flex; align-items: flex-end; gap: 4px; height: 52px; margin-bottom: 0; }
  .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .chart-bar   { width: 100%; border-radius: 3px 3px 0 0; min-height: 4px; }
  .chart-date  { font-size: 9px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; text-align: center; margin-top: 3px; }
  .chart-val   { font-size: 9px; color: #777; text-align: center; }
  .hist-row { padding: 9px 14px; border-bottom: 1px solid #181818; display: flex; justify-content: space-between; align-items: center; }
  .hist-row:last-child { border-bottom: none; }
  .hist-date   { font-size: 12px; color: var(--muted); }
  .hist-weight { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: #ccc; }
  .hist-e1rm   { font-size: 11px; color: var(--muted); }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; line-height: 1.6; }
  .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }

  /* TOAST */
  .toast { position: fixed; bottom: calc(76px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); background: #1a2a10; border: 1px solid #44aa22; color: #88dd44; font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; z-index: 200; }
  .toast.show { opacity: 1; }

  /* COOLDOWN */
  .cooldown-card { background: #080f10; border: 1px solid #0e2a2a; border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
  .cooldown-head { background: #0a1a1a; padding: 10px 14px; border-bottom: 1px solid #0e2a2a; display: flex; align-items: center; gap: 8px; }
  .cooldown-head-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #3abcbc; }
  .cooldown-head-sub { font-size: 11px; color: #2a7a7a; margin-left: auto; }
  .stretch-row { padding: 11px 14px; border-bottom: 1px solid #0e1e1e; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .stretch-row:last-child { border-bottom: none; }
  .stretch-left { flex: 1; }
  .stretch-name { font-size: 13px; font-weight: 600; color: #e0f0f0; margin-bottom: 3px; }
  .stretch-cue  { font-size: 11px; color: #3a7a7a; line-height: 1.5; }
  .stretch-hold { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 800; color: #3abcbc; flex-shrink: 0; padding-top: 1px; }
  .cooldown-note { background: #060e0e; border-left: 3px solid #0e3a3a; border-radius: 0 0 12px 12px; padding: 10px 14px; font-size: 11px; color: #2a6a6a; line-height: 1.6; }
  .cooldown-note strong { color: #3a9a9a; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .main-scroll > *, .tracker-scroll > * { animation: fadeUp 0.18s ease both; }
</style>
</head>
<body>
<div class="shell">

  <!-- WORKOUT SCREEN -->
  <div class="screen active" id="screenWorkout">
    <div class="header">
      <div class="header-row">
        <div><div class="prog-title">Travis's Program</div><div class="prog-sub">Hypertrophy · PPL + Arms · 7-Day</div></div>
        <div class="header-badge" id="headerBadge">Push A</div>
      </div>
    </div>
    <div class="day-scroll-wrap"><div class="day-scroll" id="dayScroll"></div></div>
    <div class="block-tabs-wrap"><div class="block-tabs" id="blockTabs"></div></div>
    <div class="main-scroll" id="mainScroll"></div>
  </div>

  <!-- TRACKER SCREEN -->
  <div class="screen" id="screenTracker">
    <div class="tracker-header">
      <div class="tracker-title">Progression Tracker</div>
      <div class="tracker-sub">Top working set · e1RM calculated · Auto-saved</div>
    </div>
    <div class="tracker-scroll" id="trackerScroll"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="navWorkout" onclick="switchScreen('workout')">
      <div class="nav-icon">🏋️</div><div class="nav-label">Program</div>
    </button>
    <button class="nav-btn nav-track" id="navTracker" onclick="switchScreen('tracker')">
      <div class="nav-icon">📈</div><div class="nav-label">Progress</div>
    </button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

const DAYS = [
  { dow:"Mon", name:"Push A",   type:"push"     },
  { dow:"Tue", name:"Pull A",   type:"pull"     },
  { dow:"Wed", name:"Legs A",   type:"legs"     },
  { dow:"Thu", name:"Arms",     type:"arms"     },
  { dow:"Fri", name:"Push B",   type:"push"     },
  { dow:"Sat", name:"Pull B",   type:"pull"     },
  { dow:"Sun", name:"Recovery", type:"recovery" },
];

const TRACK_EXERCISES = [
  "Incline Barbell Bench Press",
  "Barbell Bench Press (Flat)",
  "Barbell OHP",
  "Barbell Bent Over Row",
  "Weighted Pull-Up / Chin-Up",
  "Alt Lat Pulldown",
  "Barbell Front Squat",
  "Barbell RDL",
  "Barbell Glute Bridge",
  "Barbell Bicep Curl",
  "SA Overhead Tricep Extension",
  "Skull Crushers",
  "Incline DB Curl",
];

const WARMUPS = {
  push: {
    rowerNote: "5 min easy. Moderate stroke rate. Open thoracic spine with each drive.",
    mobility: [
      { name:"Wall Chest Opener",          detail:"10 reps / 5 sec hold each" },
      { name:"Shoulder CARs",              detail:"5 circles each dir. / arm"  },
      { name:"Cat-Cow (Tonal)",            detail:"10 reps — thoracic focus"   },
      { name:"Reverse Fly light (Tonal)",  detail:"2×15 — scapula activation"  },
    ],
    activation:"Pushup to Plank ×10 or Incline Push-Up ×15 — prime pecs and shoulder stabilizers before loading."
  },
  pull: {
    rowerNote:"5 min easy. Lengthen the pull phase, feel lats engage at the catch.",
    mobility:[
      { name:"Reach and Rotate (Tonal)",         detail:"10 reps each side"      },
      { name:"Ninety Ninety Arm Sweep (Tonal)",  detail:"10 reps — shoulder capsule" },
      { name:"Pulling Straps very light (Tonal)",detail:"2×12 — scapula activation"  },
      { name:"Dead Hang / Lat Stretch",          detail:"30 sec × 2 — open lats" },
    ],
    activation:"T-Pull light (Tonal) ×15 — fires lower traps and rear delts before heavy rows."
  },
  legs: {
    rowerNote:"5 min easy. Lower intensity — preserve knee freshness for squatting.",
    mobility:[
      { name:"90-90 Hip Stretch (Tonal)",    detail:"60 sec each side"      },
      { name:"Bretzel (Tonal)",              detail:"30 sec each side"      },
      { name:"Quad Hip Stretch (Tonal)",     detail:"45 sec each side"      },
      { name:"Marching Glute Bridge (Tonal)",detail:"2×15 — glute activation" },
    ],
    activation:"Goblet Squat ×15 bodyweight with 3-sec descent + squat wedges — groove pattern and warm the knee joint."
  },
  arms: {
    rowerNote:"5 min easy. Light effort — lower CNS demand day.",
    mobility:[
      { name:"Int./Ext. Shoulder Rotation light (Tonal)",detail:"2×15 each — elbow health" },
      { name:"Wrist Circles + Flexor Stretch",           detail:"30 sec each direction"    },
      { name:"Floor Slides (Tonal)",                     detail:"2×12 — scapular control"  },
      { name:"W Hold very light (Tonal)",                detail:"2×15 — rear delt prep"    },
    ],
    activation:"Light Bicep Curl + Tricep Pushdown ×15 each — blood into arms, establish mind-muscle connection."
  },
};

const BLOCKS = {
  0:[
    { id:"warmup",emoji:"🔥",label:"Warm-Up",meta:"15 min" },
    { id:"b1",emoji:"🏋️",label:"Block 1",meta:"Compounds · 2–3 min rest",
      groups:[
        { ss:false,rows:[{name:"Incline Barbell Bench Press",note:"Custom · Load barbell on Tonal uprights at 30–45° bench. Superior upper chest stimulus at your strength level.",tag:"custom",sets:"4×",reps:"6–8",rir:"RIR 1–2"}] },
        { ss:false,rows:[{name:"Barbell Bench Press (Flat)",note:"Tonal · Primary compound. Shoulder blades retracted and depressed throughout.",tag:"tonal",sets:"3×",reps:"8–10",rir:"RIR 2"}] },
      ],note:"<strong>Progression:</strong> Add weight when you hit top of rep range at target RIR for 2 consecutive sessions."
    },
    { id:"b2",emoji:"💥",label:"Block 2",meta:"Supersets · 90 sec rest",
      groups:[
        { ss:true,ssLabel:"Superset A — Upper Chest + Front Delt",rows:[
          {name:"Standing Incline Chest Press",note:"Tonal cable · Upper chest, full ROM",tag:"tonal",sets:"3×",reps:"10–12",rir:"RIR 2"},
          {name:"Front Raise",note:"Tonal · Alternating, controlled negative",tag:"tonal",sets:"3×",reps:"12–15",rir:"RIR 2"},
        ]},
        { ss:true,ssLabel:"Superset B — Fly + Lateral Delt",rows:[

const STORE_KEY = 'travis_progress_v1';
function loadLogs()    { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; } }
function saveLogs(l)   { localStorage.setItem(STORE_KEY, JSON.stringify(l)); }

function e1rm(w,r)     { return Math.round(w * (1 + r/30)); }

function logSet(ex, weight, reps) {
  const logs = loadLogs();
  if (!logs[ex]) logs[ex] = [];
  const today = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const entry = { date:today, ts:Date.now(), weight, reps, e1rm:e1rm(weight,reps) };
  // Replace same-day entry only if new one is better
  const sameDay = logs[ex].find(e=>e.date===today);
  if (sameDay) {
    if (weight > sameDay.weight || (weight===sameDay.weight && reps>sameDay.reps)) {
      logs[ex] = logs[ex].filter(e=>e.date!==today);
      logs[ex].push(entry);
    }
  } else {
    logs[ex].push(entry);
  }
  logs[ex].sort((a,b)=>a.ts-b.ts);
  saveLogs(logs);
}

function isPR(ex, weight, reps) {
  const logs = loadLogs();
  if (!logs[ex] || !logs[ex].length) return true;
  const best = Math.max(...logs[ex].map(e=>e.e1rm));
  return e1rm(weight,reps) > best;
}

function seedBaseline() {
  const logs = loadLogs();
  if (logs['_seeded']) return;
  const date = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
  logs['Incline Barbell Bench Press'] = [{date,ts:Date.now()-2000,weight:160,reps:6,e1rm:192}];
  logs['Barbell Bench Press (Flat)']  = [{date,ts:Date.now()-1000,weight:192,reps:8,e1rm:243}];
  logs['_seeded'] = true;
  saveLogs(logs);
}

            <span class="pill pill-reps">${r.reps}</span>
            ${r.rir!=='—'?`<span class="pill pill-rir">${r.rir}</span>`:''}
          </div>
        </div>
        <div class="ex-note">${r.note}</div>${tagHtml(r.tag)}
      </div>`).join('');
    html += g.ss
      ? `<div class="card"><div class="ss-bar"><div class="ss-dot"></div>${g.ssLabel} — No rest A→B</div>${inner}</div>`
      : `<div class="card">${inner}</div>`;
  });
  if (block.note) html+=`<div class="note-box" style="border-radius:12px;margin-top:-2px">${block.note}</div>`;
  return html;
}

function buildDayScroll() {
  document.getElementById('dayScroll').innerHTML=DAYS.map((d,i)=>`
    <div class="day-chip ${i===currentDay?'active-'+d.type:'chip-'+d.type}" onclick="selectDay(${i})">
      <div class="chip-dow">${d.dow}</div><div class="chip-name">${d.name}</div>
    </div>`).join('');
  setTimeout(()=>{
    const c=document.querySelectorAll('.day-chip');
    if(c[currentDay]) c[currentDay].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  },50);
}

function buildBlockTabs() {
  const dt=DAYS[currentDay].type;
  document.getElementById('blockTabs').innerHTML=BLOCKS[currentDay].map(b=>{
    const a=b.id===currentBlock;
    const cls=a?(b.id==='warmup'?'active-warmup':b.isCooldown?'active-cooldown':b.isRecovery?'active-recovery':'active-'+dt):'';
    return `<div class="block-tab ${cls}" onclick="selectBlock('${b.id}')">${b.emoji} ${b.label}</div>`;
  }).join('');
}

function buildHeader() {
  const d=DAYS[currentDay];
  const badge=document.getElementById('headerBadge');
  badge.textContent=d.name; badge.className='header-badge badge-'+d.type;
}

function buildWorkoutContent() {
  const dt=DAYS[currentDay].type;
  const block=BLOCKS[currentDay].find(b=>b.id===currentBlock)||BLOCKS[currentDay][0];
  const s=document.getElementById('mainScroll');
  s.innerHTML=renderBlockContent(block,dt); s.scrollTop=0;
}

function selectDay(i){ currentDay=i; currentBlock=BLOCKS[i][0].id; buildHeader(); buildDayScroll(); buildBlockTabs(); buildWorkoutContent(); }
function selectBlock(id){ currentBlock=id; buildBlockTabs(); buildWorkoutContent(); }

// ── TRACKER RENDER ────────────────────────────────────────────────────────────

function buildTrackerScreen() {
  const logs=loadLogs();
  const opts=TRACK_EXERCISES.map(e=>`<option value="${e}">${e}</option>`).join('');
  const withData=TRACK_EXERCISES.filter(e=>logs[e]&&logs[e].length>0);

  let histHtml = withData.length===0
    ? `<div class="empty-state"><div class="empty-icon">📊</div>No entries yet.<br>Log your first set above after today's workout!</div>`
    : withData.map(exName=>{
        const entries=logs[exName];
        const best=entries.reduce((b,e)=>e.e1rm>b.e1rm?e:b,entries[0]);
        const recent=entries.slice(-8);
        const maxW=Math.max(...recent.map(e=>e.weight));
        const bars=recent.map(e=>{
          const h=Math.max(6,Math.round((e.weight/maxW)*44));
          const isLatest=e===recent[recent.length-1];
          return `<div class="chart-bar-wrap">
            <div class="chart-val">${e.weight}</div>
            <div class="chart-bar" style="height:${h}px;background:${isLatest?'#4499dd':'#252525'}"></div>
            <div class="chart-date">${e.date}</div>
          </div>`;
        }).join('');
        const rows=[...entries].reverse().slice(0,6).map(e=>{
          const prMark=e===best?`<span class="pr-badge">PR</span>`:'';
          return `<div class="hist-row">
            <div class="hist-date">${e.date}</div>
            <div style="text-align:right">
              <span class="hist-weight">${e.weight} × ${e.reps}</span>${prMark}
              <div class="hist-e1rm">e1RM ~${e.e1rm} lb</div>
            </div>
          </div>`;
        }).join('');
        return `<div class="ex-hist-card">
          <div class="ex-hist-head">
            <div class="ex-hist-name">${exName}</div>
            <div class="ex-hist-best">Best: ${best.weight}×${best.reps}</div>
          </div>
          <div class="mini-chart"><div class="chart-bars">${bars}</div></div>
          ${rows}
        </div>`;
      }).join('');

  document.getElementById('trackerScroll').innerHTML=`
    <div class="log-form-card">
      <div class="log-form-title">📝 Log Top Set</div>
      <div class="log-row"><select class="log-select" id="logEx">${opts}</select></div>
      <div class="log-row">
        <input class="log-input" id="logWeight" type="number" placeholder="lbs" inputmode="decimal" min="0" step="2.5">
        <input class="log-input" id="logReps"   type="number" placeholder="reps" inputmode="numeric" min="1" max="30">
      </div>
      <button class="log-btn" onclick="handleLog()">Save Set</button>
    </div>
    ${histHtml}`;
}

function handleLog() {
  const ex=document.getElementById('logEx').value;
  const weight=parseFloat(document.getElementById('logWeight').value);
  const reps=parseInt(document.getElementById('logReps').value);
  if(!ex||!weight||!reps||weight<=0||reps<=0){showToast('Enter weight and reps');return;}
  const pr=isPR(ex,weight,reps);
  logSet(ex,weight,reps);
  document.getElementById('logWeight').value='';
  document.getElementById('logReps').value='';
  showToast(pr?'🏆 New PR! Logged.':'✓ Set logged');
  buildTrackerScreen();
}

// ── NAV + TOAST ───────────────────────────────────────────────────────────────

function switchScreen(name) {
  document.getElementById('screenWorkout').classList.toggle('active',name==='workout');
  document.getElementById('screenTracker').classList.toggle('active',name==='tracker');
  document.getElementById('navWorkout').classList.toggle('active',name==='workout');
  document.getElementById('navTracker').classList.toggle('active',name==='tracker');
  if(name==='tracker') buildTrackerScreen();
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── INIT ──────────────────────────────────────────────────────────────────────

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
}

seedBaseline();
selectDay(0);
</script>
