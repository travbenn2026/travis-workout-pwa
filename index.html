<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<meta name="theme-color" content="#080808">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
<link rel="apple-touch-icon" sizes="76x76" href="icons/icon-76.png">
<title>Travis's Program</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--card:#111;--card2:#161616;--border:#1e1e1e;--text:#efefef;--muted:#5a5a5a;--subtle:#2a2a2a;--push:#e8622a;--pull:#27b872;--legs:#e8a82a;--arms:#9b2de8;--recovery:#3a88cc;--acc:#e8b840;--int:#cc44ff;--del:#44bbcc;--safe-bottom:env(safe-area-inset-bottom,16px);--safe-top:env(safe-area-inset-top,0px)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.shell{display:flex;flex-direction:column;height:100dvh;padding-top:var(--safe-top)}
.bottom-nav{flex-shrink:0;display:flex;background:#0d0d0d;border-top:1px solid var(--border);padding-bottom:var(--safe-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 6px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:'Barlow',sans-serif;transition:color .15s}
.nav-btn.active{color:var(--push)}.nav-btn.active.nav-track{color:#4499dd}.nav-btn.active.nav-dash{color:#e8b840}
.nav-icon{font-size:20px;margin-bottom:3px}.nav-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden}.screen.active{display:flex}
.header{flex-shrink:0;padding:14px 18px 10px;background:var(--bg);border-bottom:1px solid var(--border)}
.header-row{display:flex;align-items:center;justify-content:space-between}
.prog-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:#fff;line-height:1}
.prog-sub{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.header-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
.badge-push{background:rgba(232,98,42,.15);color:var(--push)}.badge-pull{background:rgba(39,184,114,.15);color:var(--pull)}
.badge-legs{background:rgba(232,168,42,.15);color:var(--legs)}.badge-arms{background:rgba(155,45,232,.15);color:var(--arms)}
.badge-recovery{background:rgba(58,136,204,.15);color:var(--recovery)}
.day-scroll-wrap{flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;border-bottom:1px solid var(--border)}
.day-scroll-wrap::-webkit-scrollbar{display:none}
.day-scroll{display:flex;padding:10px 14px;gap:8px;width:max-content}
.day-chip{display:flex;flex-direction:column;align-items:center;padding:8px 14px;border-radius:10px;background:var(--card);border:1.5px solid var(--border);cursor:pointer;min-width:64px;position:relative}
.day-chip.active-push{border-color:var(--push);background:rgba(232,98,42,.08)}.day-chip.active-pull{border-color:var(--pull);background:rgba(39,184,114,.08)}
.day-chip.active-legs{border-color:var(--legs);background:rgba(232,168,42,.08)}.day-chip.active-arms{border-color:var(--arms);background:rgba(155,45,232,.08)}
.day-chip.active-recovery{border-color:var(--recovery);background:rgba(58,136,204,.08)}
.chip-dow{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.chip-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;text-transform:uppercase;white-space:nowrap}
.chip-push .chip-name,.active-push .chip-name{color:var(--push)}.chip-pull .chip-name,.active-pull .chip-name{color:var(--pull)}
.chip-legs .chip-name,.active-legs .chip-name{color:var(--legs)}.chip-arms .chip-name,.active-arms .chip-name{color:var(--arms)}
.chip-recovery .chip-name,.active-recovery .chip-name{color:var(--recovery)}
.chip-done-dot{position:absolute;top:5px;right:7px;width:6px;height:6px;border-radius:50%;background:#44cc44}
.block-tabs-wrap{flex-shrink:0;overflow-x:auto;scrollbar-width:none;background:var(--card);border-bottom:1px solid var(--border)}
.block-tabs-wrap::-webkit-scrollbar{display:none}.block-tabs{display:flex;padding:0 14px;width:max-content}
.block-tab{padding:11px 14px;font-size:12px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.block-tab.active-push{border-bottom-color:var(--push);color:var(--push)}.block-tab.active-pull{border-bottom-color:var(--pull);color:var(--pull)}
.block-tab.active-legs{border-bottom-color:var(--legs);color:var(--legs)}.block-tab.active-arms{border-bottom-color:var(--arms);color:var(--arms)}
.block-tab.active-recovery{border-bottom-color:var(--recovery);color:var(--recovery)}
.block-tab.active-warmup{border-bottom-color:#888;color:#aaa}.block-tab.active-cooldown{border-bottom-color:#3abcbc;color:#3abcbc}
.main-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.ss-bar{background:#13091e;border-bottom:1px solid var(--border);padding:6px 14px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8844cc;display:flex;align-items:center;gap:6px}
.ss-dot{width:5px;height:5px;border-radius:50%;background:#8844cc}
.ex-row{padding:12px 14px;border-bottom:1px solid var(--border)}.ex-row:last-child{border-bottom:none}
.ex-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.ex-name{font-size:14px;font-weight:600;color:#fff;flex:1;line-height:1.2}
.ex-pills{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
.pill-sets{background:var(--subtle);color:#bbb}.pill-reps{background:var(--subtle);color:#bbb}
.pill-rir{background:#1a1208;color:#aa8830}.pill-suggest{background:#0d1f10;color:#44bb66}
.ex-note{font-size:11px;color:var(--muted);line-height:1.5}
.ex-tag{display:inline-block;margin-top:5px;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.tag-tonal{background:#0a1a2a;color:#4499dd}.tag-custom{background:#191908;color:#aaaa33}
.tag-db{background:#1a0808;color:#cc5544}.tag-cardio{background:#080e1a;color:#4466cc}
.note-box{background:#0f0e08;border-left:3px solid #333;border-radius:0 0 12px 12px;padding:11px 14px;font-size:11px;color:#777;line-height:1.6}
.note-box strong{color:#999}
.done-btn{width:100%;background:#0d2010;border:1.5px solid #1a4a20;border-radius:10px;color:#44cc66;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:13px;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.done-btn.completed{background:#0a1a0a;border-color:#1a3a1a;color:#33884a}
.timing-strip{display:flex;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.t-item{flex:1;padding:11px 6px;border-right:1px solid var(--border);text-align:center}.t-item:last-child{border-right:none}
.t-time{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:#e8b840;line-height:1;margin-bottom:3px}
.t-label{font-size:11px;font-weight:600;color:#ccc;margin-bottom:2px}.t-detail{font-size:9px;color:var(--muted);line-height:1.3}
.warmup-row{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
.warmup-row:last-child{border-bottom:none}.warmup-name{font-size:13px;font-weight:500;color:#ddd}
.warmup-detail{font-size:11px;color:var(--muted);text-align:right;flex-shrink:0;max-width:130px;line-height:1.3}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:14px 0 7px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.pw-card{background:#0f0d08;border:1px solid #2a2010;border-radius:12px;padding:12px 14px;margin-bottom:10px}
.pw-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#c8a050;margin-bottom:8px}
.pw-row{display:flex;align-items:baseline;gap:10px;padding:5px 0;border-bottom:1px solid #1a1508}
.pw-row:last-child{border-bottom:none}
.pw-time-badge{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#e8b840;min-width:38px}
.pw-desc{font-size:12px;color:#a08040}
.rec-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.rec-card h4{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;color:#aaa;margin-bottom:6px}
.rec-card p{font-size:12px;color:var(--muted);line-height:1.7}
.cooldown-card{background:#080f10;border:1px solid #0e2a2a;border-radius:12px;overflow:hidden;margin-bottom:10px}
.cooldown-head{background:#0a1a1a;padding:10px 14px;border-bottom:1px solid #0e2a2a;display:flex;align-items:center;gap:8px}
.cooldown-head-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#3abcbc}
.cooldown-head-sub{font-size:11px;color:#2a7a7a;margin-left:auto}
.stretch-row{padding:11px 14px;border-bottom:1px solid #0e1e1e;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.stretch-row:last-child{border-bottom:none}.stretch-left{flex:1}
.stretch-name{font-size:13px;font-weight:600;color:#e0f0f0;margin-bottom:3px}
.stretch-cue{font-size:11px;color:#3a7a7a;line-height:1.5}
.stretch-hold{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:#3abcbc;flex-shrink:0;padding-top:1px}
.cooldown-note{background:#060e0e;border-left:3px solid #0e3a3a;border-radius:0 0 12px 12px;padding:10px 14px;font-size:11px;color:#2a6a6a;line-height:1.6}
.cooldown-note strong{color:#3a9a9a}
.tracker-header{flex-shrink:0;padding:14px 18px 10px;border-bottom:1px solid var(--border)}
.tracker-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;color:#fff}
.tracker-sub{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.tracker-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 16px}
.log-form-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px}
.log-form-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#4499dd;margin-bottom:12px}
.log-row{display:flex;gap:8px;margin-bottom:8px}
.log-select,.log-input{background:#0d0d0d;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;padding:10px 12px;outline:none;-webkit-appearance:none}
.log-select{flex:2}.log-input{flex:1;text-align:center}
.log-input:focus,.log-select:focus{border-color:#4499dd}
.log-btn{width:100%;background:#4499dd;border:none;border-radius:8px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:12px;cursor:pointer;margin-top:4px}
.log-btn:active{background:#3388cc}
.pr-badge{display:inline-block;background:#1a2a08;color:#88cc44;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.5px;margin-left:6px}
.ex-hist-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.ex-hist-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ex-hist-name{font-size:14px;font-weight:600;color:#fff}.ex-hist-best{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:#88cc44;font-weight:700}
.mini-chart{padding:12px 14px 4px}.chart-bars{display:flex;align-items:flex-end;gap:4px;height:52px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.chart-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px}
.chart-date{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center;margin-top:3px}
.chart-val{font-size:9px;color:#777;text-align:center}
.hist-row{padding:9px 14px;border-bottom:1px solid #181818;display:flex;justify-content:space-between;align-items:center}
.hist-row:last-child{border-bottom:none}.hist-date{font-size:12px;color:var(--muted)}
.hist-weight{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#ccc}
.hist-e1rm{font-size:11px;color:var(--muted)}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;line-height:1.6}
.empty-state .empty-icon{font-size:36px;margin-bottom:12px}
.dash-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 16px}
.phase-card{border-radius:14px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.phase-acc{background:linear-gradient(135deg,#1a1200,#2a1e00);border:1px solid #3a2a00}
.phase-int{background:linear-gradient(135deg,#160a20,#250f35);border:1px solid #3a1a55}
.phase-del{background:linear-gradient(135deg,#001a1a,#002828);border:1px solid #005555}
.phase-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.phase-acc .phase-label{color:#aa8020}.phase-int .phase-label{color:#9944cc}.phase-del .phase-label{color:#339999}
.phase-name{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;text-transform:uppercase;color:#fff;line-height:1;margin-bottom:8px}
.phase-week{font-size:13px;margin-bottom:12px}
.phase-acc .phase-week{color:#c8a040}.phase-int .phase-week{color:#bb66ee}.phase-del .phase-week{color:#44aaaa}
.phase-bar-bg{background:rgba(255,255,255,.1);border-radius:4px;height:6px;margin-bottom:8px}
.phase-bar-fill{height:6px;border-radius:4px}
.phase-acc .phase-bar-fill{background:#e8b840}.phase-int .phase-bar-fill{background:#cc44ff}.phase-del .phase-bar-fill{background:#44cccc}
.phase-next{font-size:11px}
.phase-acc .phase-next{color:#806010}.phase-int .phase-next{color:#7722aa}.phase-del .phase-next{color:#227777}
.streak-row{display:flex;gap:10px;margin-bottom:12px}
.streak-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.streak-num{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;line-height:1;margin-bottom:4px}
.streak-fire .streak-num{color:#ff8844}.streak-sessions .streak-num{color:#4499dd}
.streak-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.week-dots-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.week-dots-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.week-dots{display:flex;gap:6px;justify-content:space-between}
.week-dot{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.dot-circle{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px}
.dot-circle.done{background:#0d2010;border-color:#1a4a20}.dot-circle.today{border-color:#e8b840;background:rgba(232,184,64,.08)}
.dot-label{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase}
.pr-wall-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.pr-wall-head{padding:12px 14px;border-bottom:1px solid var(--border)}
.pr-wall-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#88cc44}
.pr-row{padding:10px 14px;border-bottom:1px solid #161616;display:flex;justify-content:space-between;align-items:center}
.pr-row:last-child{border-bottom:none}.pr-ex{font-size:12px;font-weight:600;color:#ccc}.pr-right{text-align:right}
.pr-val{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:#fff}
.pr-e1rm{font-size:10px;color:var(--muted)}.pr-date{font-size:10px;color:var(--muted)}
.pr-empty{padding:20px 14px;text-align:center;font-size:12px;color:var(--muted)}
.toast{position:fixed;bottom:calc(76px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:#1a2a10;border:1px solid #44aa22;color:#88dd44;font-size:13px;font-weight:600;padding:10px 20px;border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.show{opacity:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.main-scroll>*,.tracker-scroll>*,.dash-scroll>*{animation:fadeUp .18s ease both}
</style>
</head>
<body>
<div class="shell">
  <div class="screen active" id="screenWorkout">
    <div class="header">
      <div class="header-row">
        <div><div class="prog-title">Travis's Program</div><div class="prog-sub">Hypertrophy · PPL + Arms · 7-Day</div></div>
        <div class="header-badge" id="headerBadge">Push A</div>
      </div>
    </div>
    <div class="day-scroll-wrap"><div class="day-scroll" id="dayScroll"></div></div>
    <div class="block-tabs-wrap"><div class="block-tabs" id="blockTabs"></div></div>
    <div class="main-scroll" id="mainScroll"></div>
  </div>
  <div class="screen" id="screenTracker">
    <div class="tracker-header"><div class="tracker-title">Progression Tracker</div><div class="tracker-sub">Top working set · e1RM calculated · Auto-saved</div></div>
    <div class="tracker-scroll" id="trackerScroll"></div>
  </div>
  <div class="screen" id="screenDash">
    <div class="header">
      <div class="header-row"><div><div class="prog-title">Dashboard</div><div class="prog-sub" id="dashPhaseSub">Loading...</div></div></div>
    </div>
    <div class="dash-scroll" id="dashScroll"></div>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn active" id="navWorkout" onclick="switchScreen('workout')"><div class="nav-icon">&#127947;&#65039;</div><div class="nav-label">Program</div></button>
    <button class="nav-btn nav-track" id="navTracker" onclick="switchScreen('tracker')"><div class="nav-icon">&#128200;</div><div class="nav-label">Progress</div></button>
    <button class="nav-btn nav-dash" id="navDash" onclick="switchScreen('dash')"><div class="nav-icon">&#9889;</div><div class="nav-label">Dashboard</div></button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const PROGRAM_START=new Date('2025-05-09');
const PHASES=[
  {name:'Accumulation',weeks:8,color:'acc',repRanges:{compound:'6-8',accessory:'10-15'},rirNote:'RIR 1-2',suggestMult:1.0,description:'Build volume and muscle tissue. Progress via reps first, then weight.'},
  {name:'Intensification',weeks:8,color:'int',repRanges:{compound:'3-5',accessory:'6-10'},rirNote:'RIR 0-1',suggestMult:1.1,description:'Express strength built in Accumulation. Heavier loads, less total volume.'},
  {name:'Deload',weeks:2,color:'del',repRanges:{compound:'8-10',accessory:'12-15'},rirNote:'RIR 3-4',suggestMult:0.5,description:'Recovery week. 50% volume, same movements, let the body consolidate.'},
];
function getPhaseInfo(){
  const msW=7*24*60*60*1000;
  const totalW=Math.floor((Date.now()-PROGRAM_START)/msW);
  const cycleLen=18;
  const wic=totalW%cycleLen;
  let acc=0;
  for(let i=0;i<PHASES.length;i++){
    if(wic<acc+PHASES[i].weeks){
      const wip=wic-acc+1;
      const wLeft=PHASES[i].weeks-wip+1;
      const pct=((wip-1)/PHASES[i].weeks)*100;

function logSet(ex,weight,reps){

function tagHtml(tag){const m={tonal:['tag-tonal','Tonal'],custom:['tag-custom','Custom'],db:['tag-db','Dumbbell'],cardio:['tag-cardio','Cardio']};const[c,l]=m[tag]||['tag-tonal','Tonal'];return '<span class="ex-tag '+c+'">'+l+'</span>';}
function renderWarmup(dt){const w=WARMUPS[dt];if(!w)return '';return '<div class="pw-card" style="background:#080d0f;border-color:#102030"><div class="pw-title" style="color:#4a99cc">Morning Protocol</div><div class="pw-row"><span class="pw-time-badge">5:00</span><span class="pw-desc">C4 Pre-Workout + Rice cake w/ honey</span></div><div class="pw-row"><span class="pw-time-badge">5:10</span><span class="pw-desc">Creatine 5g - Multivitamin - Fish Oil</span></div><div class="pw-row"><span class="pw-time-badge">5:45</span><span class="pw-desc">Training begins - Amino Energy intra-workout</span></div><div class="pw-row"><span class="pw-time-badge">Post</span><span class="pw-desc">50g Whey - TRT cream x2 daily</span></div></div><div class="timing-strip"><div class="t-item"><div class="t-time">5:45</div><div class="t-label">Rower</div><div class="t-detail">5 min Zone 1</div></div><div class="t-item"><div class="t-time">5:50</div><div class="t-label">Mobility</div><div class="t-detail">6-7 min</div></div><div class="t-item"><div class="t-time">5:57</div><div class="t-label">Activate</div><div class="t-detail">3 min</div></div><div class="t-item"><div class="t-time">6:00</div><div class="t-label">Work</div><div class="t-detail">Sets begin</div></div></div><div class="section-label">Rower</div><div class="card"><div class="ex-row"><div class="ex-top"><div class="ex-name">Concept 2 - 5 min easy</div></div><div class="ex-note">'+w.rowerNote+'</div><span class="ex-tag tag-cardio">Cardio</span></div></div><div class="section-label">Mobility</div><div class="card">'+w.mobility.map(function(m){return '<div class="warmup-row"><div class="warmup-name">'+m.name+'</div><div class="warmup-detail">'+m.detail+'</div></div>';}).join('')+'</div><div class="section-label">Activation</div><div class="card"><div class="ex-row"><div class="ex-note">'+w.activation+'</div></div></div>';}
function renderCooldown(type){const c=COOLDOWNS[type];if(!c)return '';return '<div class="cooldown-card"><div class="cooldown-head"><span style="font-size:16px">&#129398;</span><div class="cooldown-head-title">Post-Workout Stretch</div><div class="cooldown-head-sub">~5 min</div></div>'+c.stretches.map(function(s){return '<div class="stretch-row"><div class="stretch-left"><div class="stretch-name">'+s.name+'</div><div class="stretch-cue">'+s.cue+'</div></div><div class="stretch-hold">'+s.hold+'</div></div>';}).join('')+'</div><div class="cooldown-note">'+c.note+'</div>';}
function renderBlockContent(block,dt){
  if(block.isCooldown)return renderCooldown(block.cooldownType);
  if(block.id==='warmup')return renderWarmup(dt);
  if(block.isRecovery)return '<div class="pw-card" style="background:#080d0f;border-color:#102030"><div class="pw-title" style="color:#4a99cc">Morning Protocol</div><div class="pw-row"><span class="pw-time-badge">5:00</span><span class="pw-desc">C4 + Rice cake w/ honey</span></div><div class="pw-row"><span class="pw-time-badge">5:10</span><span class="pw-desc">Creatine - Multivitamin - Fish Oil</span></div><div class="pw-row"><span class="pw-time-badge">5:45</span><span class="pw-desc">Cardio begins</span></div><div class="pw-row"><span class="pw-time-badge">Post</span><span class="pw-desc">50g Whey - TRT cream x2</span></div></div><div class="rec-card"><h4>&#128675; Option A - Rower</h4><p>20-25 min easy Zone 2. Upper-body dominant - minimal knee load. Damper 3-5.</p></div><div class="rec-card"><h4>&#128260; Option B - Elliptical</h4><p>25-30 min low resistance. Zero knee impact. Best if knee is beat up from the week.</p></div><div class="rec-card"><h4>&#127973; Sauna</h4><p>15-20 min post-cardio. Supports GH release, recovery, and cardiovascular adaptation. Synergistic with TRT and Tirzepatide.</p></div><div class="rec-card"><h4>&#128208; Mobility (10 min)</h4><p>90-90 Hip Stretch to Bretzel to Lying Hamstring Stretch to Cat-Cow. All in Tonal library.</p></div><div class="note-box" style="border-radius:12px">Recovery day does real work - do not skip it.</div>';
  var html='';
  block.groups.forEach(function(g){
    var inner=g.rows.map(function(r){
      var sug=getSuggestion(r.name);
      var sp=sug?'<span class="pill pill-suggest">Target: '+sug+' lb</span>':'';
      return '<div class="ex-row"><div class="ex-top"><div class="ex-name">'+r.name+'</div><div class="ex-pills"><span class="pill pill-sets">'+r.sets+'</span><span class="pill pill-reps">'+r.reps+'</span>'+(r.rir!=='-'?'<span class="pill pill-rir">'+r.rir+'</span>':'')+sp+'</div></div><div class="ex-note">'+r.note+'</div>'+tagHtml(r.tag)+'</div>';
    }).join('');
    html+=g.ss?'<div class="card"><div class="ss-bar"><div class="ss-dot"></div>'+g.ssLabel+' - No rest A to B</div>'+inner+'</div>':'<div class="card">'+inner+'</div>';
  });
  if(block.note)html+='<div class="note-box" style="border-radius:12px;margin-top:-2px">'+block.note+'</div>';
  var dayBlocks=BLOCKS[currentDay];
  var lastWB=[].concat(dayBlocks).reverse().find(function(b){return!b.isCooldown&&!b.isRecovery&&b.id!=='warmup';});
  if(block===lastWB){var done=isSessionDone(currentDay);html+='<button class="done-btn '+(done?'completed':'')+'" onclick="handleSessionDone()">'+(done?'&#10003; Session Logged':'&#9989; Mark Session Complete')+'</button>';}
  return html;
}
function buildDayScroll(){document.getElementById('dayScroll').innerHTML=DAYS.map(function(d,i){var done=isSessionDone(i);return '<div class="day-chip '+(i===currentDay?'active-'+d.type:'chip-'+d.type)+'" onclick="selectDay('+i+')"><div class="chip-dow">'+d.dow+'</div><div class="chip-name">'+d.name+'</div>'+(done?'<div class="chip-done-dot"></div>':'')+'</div>';}).join('');setTimeout(function(){var c=document.querySelectorAll('.day-chip');if(c[currentDay])c[currentDay].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});},50);}
function buildBlockTabs(){var dt=DAYS[currentDay].type;document.getElementById('blockTabs').innerHTML=BLOCKS[currentDay].map(function(b){var a=b.id===currentBlock;var cls=a?(b.isCooldown?'active-cooldown':b.id==='warmup'?'active-warmup':b.isRecovery?'active-recovery':'active-'+dt):'';return '<div class="block-tab '+cls+'" onclick="selectBlock(''+b.id+'')">'+b.emoji+' '+b.label+'</div>';}).join('');}
function buildHeader(){var d=DAYS[currentDay];var badge=document.getElementById('headerBadge');badge.textContent=d.name;badge.className='header-badge badge-'+d.type;}
function buildWorkoutContent(){var dt=DAYS[currentDay].type;var block=BLOCKS[currentDay].find(function(b){return b.id===currentBlock;})||BLOCKS[currentDay][0];var s=document.getElementById('mainScroll');s.innerHTML=renderBlockContent(block,dt);s.scrollTop=0;}
function selectDay(i){currentDay=i;currentBlock=BLOCKS[i][0].id;buildHeader();buildDayScroll();buildBlockTabs();buildWorkoutContent();}
function selectBlock(id){currentBlock=id;buildBlockTabs();buildWorkoutContent();}
function handleSessionDone(){markSessionDone(currentDay);buildWorkoutContent();buildDayScroll();showToast('Session logged!');}
function buildTrackerScreen(){
  var logs=loadLogs();
  var opts=TRACK_EXERCISES.map(function(e){return '<option value="'+e+'">'+e+'</option>';}).join('');
  var withData=TRACK_EXERCISES.filter(function(e){return logs[e]&&logs[e].length>0;});
  var histHtml=withData.length===0?'<div class="empty-state"><div class="empty-icon">&#128202;</div>No entries yet. Log your first set above!</div>':withData.map(function(exName){
    var entries=logs[exName];
    var best=entries.reduce(function(b,e){return e.e1rm>b.e1rm?e:b;},entries[0]);
    var recent=entries.slice(-8);var maxW=Math.max.apply(null,recent.map(function(e){return e.weight;}));
    var bars=recent.map(function(e){var h=Math.max(6,Math.round((e.weight/maxW)*44));var isL=e===recent[recent.length-1];return '<div class="chart-bar-wrap"><div class="chart-val">'+e.weight+'</div><div class="chart-bar" style="height:'+h+'px;background:'+(isL?'#4499dd':'#252525')+'"></div><div class="chart-date">'+e.date+'</div></div>';}).join('');
    var rows=[].concat(entries).reverse().slice(0,5).map(function(e){var pm=e===best?'<span class="pr-badge">PR</span>':'';return '<div class="hist-row"><div class="hist-date">'+e.date+'</div><div style="text-align:right"><span class="hist-weight">'+e.weight+' x '+e.reps+'</span>'+pm+'<div class="hist-e1rm">e1RM ~'+e.e1rm+' lb</div></div></div>';}).join('');
    return '<div class="ex-hist-card"><div class="ex-hist-head"><div class="ex-hist-name">'+exName+'</div><div class="ex-hist-best">Best: '+best.weight+'x'+best.reps+'</div></div><div class="mini-chart"><div class="chart-bars">'+bars+'</div></div>'+rows+'</div>';
  }).join('');
  document.getElementById('trackerScroll').innerHTML='<div class="log-form-card"><div class="log-form-title">&#128221; Log Top Set</div><div class="log-row"><select class="log-select" id="logEx">'+opts+'</select></div><div class="log-row"><input class="log-input" id="logWeight" type="number" placeholder="lbs" inputmode="decimal" min="0" step="2.5"><input class="log-input" id="logReps" type="number" placeholder="reps" inputmode="numeric" min="1" max="30"></div><button class="log-btn" onclick="handleLog()">Save Set</button></div>'+histHtml;
}
function handleLog(){var ex=document.getElementById('logEx').value;var weight=parseFloat(document.getElementById('logWeight').value);var reps=parseInt(document.getElementById('logReps').value);if(!ex||!weight||!reps||weight<=0||reps<=0){showToast('Enter weight and reps');return;}var pr=isPR(ex,weight,reps);logSet(ex,weight,reps);document.getElementById('logWeight').value='';document.getElementById('logReps').value='';showToast(pr?'&#127942; New PR! Logged.':'Set logged');buildTrackerScreen();}
function buildDashboard(){
  var info=getPhaseInfo();var p=info.phase;
  var streakW=getStreakWeeks();var totalS=getTotalSessions();var logs=loadLogs();
  document.getElementById('dashPhaseSub').textContent='Week '+info.weekInPhase+' of '+p.weeks+' - '+p.name;
  var msW=7*24*60*60*1000;
  var weekStart=new Date(PROGRAM_START.getTime()+(info.totalWeeks-1)*msW);
  var sessions=loadSessions();
  var thisWeek=sessions.filter(function(s){var d=new Date(s.ts);return d>=weekStart&&d<new Date(weekStart.getTime()+msW);});
  var todayDow=new Date().getDay();var dayMap=[1,2,3,4,5,6,0];
  var weekDots=DAYS.map(function(d,i){var done=thisWeek.some(function(s){return s.dayIdx===i;});var isToday=dayMap[i]===todayDow;return '<div class="week-dot"><div class="dot-circle '+(done?'done':isToday?'today')+'">'+(done?'&#10003;':d.dow[0])+'</div><div class="dot-label">'+d.name.split(' ')[0]+'</div></div>';}).join('');
  var prRows=TRACK_EXERCISES.map(function(exName){if(!logs[exName]||!logs[exName].length)return null;var best=logs[exName].reduce(function(b,e){return e.e1rm>b.e1rm?e:b;},logs[exName][0]);return '<div class="pr-row"><div class="pr-ex">'+exName+'</div><div class="pr-right"><div class="pr-val">'+best.weight+' x '+best.reps+'</div><div class="pr-e1rm">e1RM ~'+best.e1rm+' lb - <span class="pr-date">'+best.date+'</span></div></div></div>';}).filter(Boolean).join('');
  var pct=Math.min(100,Math.round(info.pct));
  var nextDate=new Date(Date.now()+info.weeksLeft*7*24*60*60*1000).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  document.getElementById('dashScroll').innerHTML='<div class="phase-card phase-'+p.color+'"><div class="phase-label">Current Phase</div><div class="phase-name">'+p.name+'</div><div class="phase-week">Week '+info.weekInPhase+' of '+p.weeks+' - '+info.weeksLeft+' week'+(info.weeksLeft!==1?'s':'')+' remaining</div><div class="phase-bar-bg"><div class="phase-bar-fill" style="width:'+pct+'%"></div></div><div class="phase-next">Next: '+info.nextPhase.name+' in '+info.weeksLeft+' week'+(info.weeksLeft!==1?'s':'')+' - ~'+nextDate+'</div></div><div class="phase-card phase-'+p.color+'"><div class="phase-label">Phase Guidance</div><div style="font-size:12px;margin-bottom:10px;opacity:.85">'+p.description+'</div><div style="display:flex;gap:16px;font-size:12px"><div><span style="color:var(--muted);font-size:10px;display:block;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Compounds</span><strong>'+p.repRanges.compound+' reps</strong></div><div><span style="color:var(--muted);font-size:10px;display:block;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Accessories</span><strong>'+p.repRanges.accessory+' reps</strong></div><div><span style="color:var(--muted);font-size:10px;display:block;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Intensity</span><strong>'+p.rirNote+'</strong></div></div></div><div class="streak-row"><div class="streak-card streak-fire"><div class="streak-num">'+streakW+'</div><div class="streak-label">Week Streak &#128293;</div></div><div class="streak-card streak-sessions"><div class="streak-num">'+totalS+'</div><div class="streak-label">Total Sessions</div></div></div><div class="week-dots-card"><div class="week-dots-title">This Week - Week '+info.weekInPhase+'</div><div class="week-dots">'+weekDots+'</div></div><div class="pr-wall-card"><div class="pr-wall-head"><div class="pr-wall-title">&#127942; PR Wall - All-Time Bests</div></div>'+(prRows||'<div class="pr-empty">Log sets in the Progress tab to see your PRs here.</div>')+'</div>';
}
function switchScreen(name){['workout','tracker','dash'].forEach(function(s){document.getElementById('screen'+s.charAt(0).toUpperCase()+s.slice(1)).classList.toggle('active',s===name);document.getElementById('nav'+s.charAt(0).toUpperCase()+s.slice(1)).classList.toggle('active',s===name);});if(name==='tracker')buildTrackerScreen();if(name==='dash')buildDashboard();}
var toastTimer;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove('show');},2200);}
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){});});}
seedBaseline();selectDay(0);
</script>
